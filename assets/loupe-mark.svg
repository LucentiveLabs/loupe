<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Loupe">
  <title>Loupe</title>
  <!-- Optical mark: the field of options (outer ring) narrows through the lens
       (inner ring) to the one locked decision (bright focal core). -->
