name: Release

# Changesets release via npm Trusted Publishing (OIDC).
#
# On push to main: if changesets are pending, changesets/action opens a
# "Version Packages" PR (it does NOT publish). Merging that PR bumps versions
# and consumes the changesets; this workflow then runs `pnpm release` →
# `changeset publish` with provenance (NPM_CONFIG_PROVENANCE below).
#
# The Version PR is created regardless, but the publish step only SUCCEEDS once:
#   1. the repository is PUBLIC (provenance requires a public repo + package),
#   2. the @lucentive-labs npm org/scope exists, and
#   3. an npm Trusted Publisher is configured for this repo + workflow
#      (npmjs.com → @lucentive-labs → Publishing access → Trusted Publisher),
#      with npm CLI >= 11.5.1 and Node >= 22.14 on the runner.
# With Trusted Publishing, NO npm token is needed — `id-token: write` lets the
# npm CLI exchange the GitHub OIDC token for a short-lived publish credential.

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC token for npm Trusted Publishing + provenance
  contents: write # changesets/action pushes the version PR / tags / releases
  pull-requests: write # changesets/action opens the "Version Packages" PR

jobs:
  release:
    name: Release
    # Only ever runs on main in the LucentiveLabs org. The publish step no-ops
    # until a Version PR merges and the Trusted Publisher (above) is configured.
    if: ${{ github.ref == 'refs/heads/main' && github.repository_owner == 'LucentiveLabs' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # npm Trusted Publishing (OIDC) + provenance require npm >= 11.5.1, newer
      # than the npm bundled with Node 22. Upgrade it before the publish step.
      # PINNED (not @latest): an unpinned upgrade shipped a broken sigstore
      # dependency tree (MODULE_NOT_FOUND at publish), so the release lane
      # inherits upstream breakage silently. Bump deliberately.
      - name: Upgrade npm (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@11.6.2

      # `pnpm install` runs the repo's `prepare` script, which points
      # core.hooksPath at scripts/githooks — so the pre-commit gitleaks gate
      # also fires on the changesets/action "Version Packages" bot commit.
      # The gate fails CLOSED when gitleaks is missing, so install it (pinned +
      # checksum-verified, mirroring security-gate.yml) before any commit.
      - name: Install gitleaks (pre-commit hook fails closed without it)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP" # keep downloads out of the workspace (bot commit does `git add .`)
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSL -o gitleaks.tgz "${base}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o gitleaks_checksums.txt "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          awk -v n="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" '$2==n{print $1"  gitleaks.tgz"}' gitleaks_checksums.txt | sha256sum -c -
          tar -xzf gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        env:
          NPM_CONFIG_PROVENANCE: "true" # publish with provenance attestation
        with:
          # `release` builds the packages then runs `changeset publish`.
          # Publishing uses npm Trusted Publishing (OIDC) — no NPM_TOKEN.
          publish: pnpm release
          version: pnpm changeset version
