# Standing security gate — .github/workflows/security-gate.yml
#
# Runs on every PR. v1 policy: SECRETS BLOCK (gitleaks, full git history);
# dependency CVEs (osv-scanner) and SAST (semgrep) REPORT into the job
# summary but do not fail the PR yet. Flip the final step to `--fail-on high`
# once the deps/SAST report backlog is triaged.
#
# Actions are pinned by commit SHA (not tag). Scanner versions are pinned below;
# bump them deliberately. Kept intentionally cheap so it is never disabled for
# spend — heavy build/test stays in the repo's own (dispatch-only) workflows.
name: security-gate

on:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly recurring scan — Mon 06:00 UTC. Catches newly-disclosed
    # dependency CVEs and any secret that slipped in between PRs.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.1"
  OSV_SCANNER_VERSION: "2.4.0"
  SEMGREP_VERSION: "1.168.0"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install scanners
        run: |
          set -euo pipefail
          # gitleaks — download + verify against the release's official checksums file.
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSL -o gitleaks.tgz "${base}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o gitleaks_checksums.txt "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          awk -v n="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" '$2==n{print $1"  gitleaks.tgz"}' gitleaks_checksums.txt | sha256sum -c -
          tar -xzf gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version
          # osv-scanner — download + verify against the release's official checksums file.
          # NOTE: osv-scanner v2 ships the checksums as `osv-scanner_SHA256SUMS`;
          # there is no `osv-scanner_<version>_checksums.txt` (that URL 404s and the
          # install silently fails, so the whole gate never goes green).
          obase="https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}"
          curl -fsSL -o osv-scanner "${obase}/osv-scanner_linux_amd64"
          curl -fsSL -o osv_checksums.txt "${obase}/osv-scanner_SHA256SUMS"
          awk '$2=="osv-scanner_linux_amd64"{print $1"  osv-scanner"}' osv_checksums.txt | sha256sum -c -
          install -m 0755 osv-scanner /usr/local/bin/osv-scanner
          osv-scanner --version
          # semgrep — PINNED version (no mutable latest for a blocking gate).
          pipx install "semgrep==${SEMGREP_VERSION}" || pip install --user "semgrep==${SEMGREP_VERSION}"
          semgrep --version

      - name: Run security gate
        run: |
          chmod +x scripts/security-scan.sh
          # v1: block on secrets, report deps/SAST. Flip to --fail-on high after backlog triage.
          scripts/security-scan.sh --mode full --fail-on secrets
